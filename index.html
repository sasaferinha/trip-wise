<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e0d" />
    <meta name="description" content="Tripwise — planeje sua viagem sem surpresas." />
    <title>Tripwise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .tw-mini-simulator{margin-top:28px;padding:18px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.045)}
      .tw-mini-simulator h3{margin:0 0 6px;font-size:18px}.tw-mini-simulator p{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.5}.tw-sim-grid{display:grid;grid-template-columns:1.1fr .7fr .7fr;gap:10px}.tw-sim-grid .btn{grid-column:1/-1;width:100%}
      .tw-upgrade-section{margin-top:28px}.tw-upgrade-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.tw-box{padding:22px;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.045)}.tw-card-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.tw-card-title h3{margin:0;font-size:20px}.tw-badge{padding:7px 10px;border-radius:999px;background:rgba(98,230,165,.1);color:var(--green);font-size:11px;font-weight:800;white-space:nowrap}
      .tw-expense{display:grid;grid-template-columns:92px 1fr auto;gap:10px;align-items:center;margin:12px 0;font-size:13px;color:#dbe4df}.tw-expense div{height:8px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}.tw-expense i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#8df0c0)}.tw-expense b{font-size:12px}.tw-summary-row{display:flex;justify-content:space-between;gap:14px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}.tw-summary-row span{color:var(--muted)}.tw-summary-row b{text-align:right;color:white}
      .tw-destinations-strip{margin-top:18px}.tw-dest-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.tw-dest-card{border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:15px;background:rgba(255,255,255,.035)}.tw-dest-card strong{display:block;margin-bottom:4px}.tw-dest-card span{display:block;color:var(--muted);font-size:12px;line-height:1.4}.tw-dest-card b{display:block;margin-top:10px;color:var(--green);font-size:13px}.tw-hotel-fit{display:inline-flex;align-items:center;margin-top:8px;padding:6px 9px;border-radius:999px;background:rgba(98,230,165,.1);color:var(--green);font-size:11px;font-weight:800}.tw-hotel-fit.warn{background:rgba(255,174,66,.12);color:#ffca7a}.tw-community-note{margin:0 0 18px;padding:16px 18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(135deg,rgba(98,230,165,.08),rgba(255,255,255,.03));color:#dfe8e3;font-size:14px;line-height:1.5}
      @media(max-width:900px){.tw-upgrade-grid,.tw-dest-grid,.tw-sim-grid{grid-template-columns:1fr}.tw-upgrade-section{margin-bottom:18px}}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="toast" class="toast" aria-live="polite"></div>
    <script type="module" src="./app.js"></script>
    <script>
      (()=>{const money=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(Number(v)||0);const readTrip=()=>{try{return JSON.parse(localStorage.getItem('tripwise-trip')||'null')||{origin:'São Paulo',destination:'Lisboa',start:'2026-09-12',end:'2026-09-19',people:2,budget:8500,style:'Intermediária'}}catch{return{origin:'São Paulo',destination:'Lisboa',start:'2026-09-12',end:'2026-09-19',people:2,budget:8500,style:'Intermediária'}}};const d=t=>Math.max(1,Math.round((new Date(t.end)-new Date(t.start))/86400000)||1);const est=t=>Math.round(Number(t.budget||0)*.78);const cats=t=>{const total=est(t);return [['Passagens',.34],['Hospedagem',.31],['Alimentação',.18],['Transporte',.09],['Passeios',.08]].map(([n,p])=>[n,Math.round(total*p)])};function home(){const h=document.querySelector('.hero-copy');if(!h||h.querySelector('.tw-mini-simulator'))return;h.insertAdjacentHTML('beforeend',`<form class="tw-mini-simulator" id="tw-mini-simulator"><h3>Simule em 15 segundos</h3><p>Coloque destino, dias e orçamento para montar uma base inicial.</p><div class="tw-sim-grid"><input class="input" name="destination" placeholder="Destino" value="Lisboa" required><input class="input" name="days" type="number" min="1" value="7" required><input class="input" name="budget" type="number" min="500" step="100" value="8500" required><button class="btn" type="submit">Simular viagem</button></div></form>`);document.getElementById('tw-mini-simulator').onsubmit=e=>{e.preventDefault();const f=new FormData(e.currentTarget),s=new Date();s.setDate(s.getDate()+45);const end=new Date(s);end.setDate(end.getDate()+Number(f.get('days')||7));const iso=x=>x.toISOString().slice(0,10);localStorage.setItem('tripwise-trip',JSON.stringify({origin:'São Paulo',destination:String(f.get('destination')||'Lisboa'),start:iso(s),end:iso(end),people:2,budget:Number(f.get('budget')||8500),style:'Intermediária'}));location.hash='dashboard'}}function dashboard(){const page=document.querySelector('.page'),stats=document.querySelector('.stats-grid');if(!page||!stats||page.querySelector('.tw-upgrade-section'))return;const t=readTrip(),spent=est(t),rest=Number(t.budget||0)-spent,items=cats(t),max=Math.max(...items.map(x=>x[1]),1);stats.insertAdjacentHTML('afterend',`<section class="tw-upgrade-section"><div class="tw-upgrade-grid"><article class="tw-box"><div class="tw-card-title"><h3>Orçamento detalhado</h3><span class="tw-badge">${rest>=0?'Dentro do orçamento':'Acima do limite'}</span></div>${items.map(([n,v])=>`<div class="tw-expense"><span>${n}</span><div><i style="width:${Math.round(v/max*100)}%"></i></div><b>${money(v)}</b></div>`).join('')}</article><article class="tw-box"><div class="tw-card-title"><h3>Resumo da viagem</h3><span class="tw-badge">${d(t)} dias</span></div><div class="tw-summary-row"><span>Destino</span><b>${t.destination}</b></div><div class="tw-summary-row"><span>Viajantes</span><b>${t.people} pessoas</b></div><div class="tw-summary-row"><span>Estimativa</span><b>${money(spent)}</b></div><div class="tw-summary-row"><span>Por pessoa</span><b>${money(spent/Number(t.people||1))}</b></div><div class="tw-summary-row"><span>Margem livre</span><b>${money(rest)}</b></div></article></div><article class="tw-box tw-destinations-strip"><div class="tw-card-title"><h3>Viagens possíveis com esse perfil</h3><span class="tw-badge">Custo-benefício</span></div><div class="tw-dest-grid"><div class="tw-dest-card"><strong>Buenos Aires</strong><span>Viagem curta, urbana e econômica.</span><b>A partir de ${money(3200)}</b></div><div class="tw-dest-card"><strong>Rio de Janeiro</strong><span>Poucos dias e alto impacto visual.</span><b>A partir de ${money(3800)}</b></div><div class="tw-dest-card"><strong>Lisboa</strong><span>Internacional forte para 7 dias.</span><b>A partir de ${money(7800)}</b></div></div></article></section>`)}function stays(){const t=readTrip(),limit=est(t)*.34;document.querySelectorAll('.hotel-card').forEach(c=>{if(c.querySelector('.tw-hotel-fit'))return;const night=Number((c.querySelector('.price strong')?.textContent||'').replace(/[^0-9]/g,''))||0,total=night*d(t),ok=total<=limit;c.querySelector('.hotel-place')?.insertAdjacentHTML('afterend',`<span class="tw-hotel-fit ${ok?'':'warn'}">${ok?'Cabe no orçamento':'Pode pesar no orçamento'}</span>`)});}function community(){const layout=document.querySelector('.community-layout');if(!layout||document.querySelector('.tw-community-note'))return;layout.insertAdjacentHTML('beforebegin','<div class="tw-community-note"><b>Ideia forte da Tripwise:</b> cada roteiro mostra dias, gasto real, hospedagem e transporte. O usuário pode copiar e adaptar ao próprio orçamento.</div>')}function run(){home();dashboard();stays();community()}window.addEventListener('hashchange',()=>setTimeout(run,120));window.addEventListener('DOMContentLoaded',()=>setTimeout(run,180));setTimeout(run,250)})();
    </script>
  </body>
</html>
